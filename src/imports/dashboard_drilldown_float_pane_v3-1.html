<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Drilldown · Float Pane v3 — Visibility Cloud</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f4;
    --color-background-tertiary: #eeece8;
    --color-background-info: #e6f1fb;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-border-tertiary: rgba(0,0,0,0.10);
    --color-border-secondary: rgba(0,0,0,0.18);
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #252523;
      --color-background-tertiary: #2e2e2c;
      --color-background-info: #0c447c22;
      --color-text-primary: #f0ede8;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-border-tertiary: rgba(255,255,255,0.10);
      --color-border-secondary: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }

  .demo-wrapper { width: 100%; max-width: 860px; }
  .demo-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--color-text-tertiary); margin-bottom: 12px; font-weight: 500;
  }

  .shell {
    display: flex; height: 500px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-tertiary);
    position: relative;
  }

  .nav-pane {
    width: 52px; min-width: 52px;
    background: var(--color-background-secondary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px; flex-shrink: 0;
  }
  .nav-icon { width: 36px; height: 36px; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; }
  .nav-icon.active { background: var(--color-background-info); }
  .icon-sq { width: 15px; height: 15px; border-radius: 3px; background: var(--color-border-secondary); }
  .nav-icon.active .icon-sq { background: var(--color-text-info); }
  .nav-divider { width: 28px; height: 0.5px; background: var(--color-border-tertiary); margin: 4px 0; }

  .workspace { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; overflow: hidden; }

  .ws-header {
    padding: 10px 14px 9px;
    background: var(--color-background-secondary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .ws-title { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
  .ws-hint { font-size: 11px; color: var(--color-text-tertiary); transition: opacity 300ms; }
  .ws-hint.hidden { opacity: 0; }

  .dashboard {
    flex: 1; overflow-y: auto; padding: 12px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; align-content: start;
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 12px 14px;
  }
  .card.span2 { grid-column: span 2; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); margin-bottom: 14px; }

  .pie-wrap { display: flex; align-items: center; gap: 16px; }
  .pie-legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .pie-legend-row { display: flex; align-items: center; gap: 7px; }
  .pie-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pie-line { height: 5px; border-radius: 3px; background: var(--color-border-tertiary); }

  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; cursor: pointer; transition: opacity 120ms; }
  .bar:hover { opacity: 0.75; }
  .bar.active-bar { outline: 2px solid var(--color-text-info); outline-offset: 2px; }

  .tbl { display: flex; flex-direction: column; }
  .tbl-head { display: flex; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 2px; }
  .tbl-head-cell { height: 5px; border-radius: 3px; background: var(--color-border-tertiary); opacity: 0.6; }
  .tbl-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
    cursor: pointer; transition: background 80ms; border-radius: 4px;
  }
  .tbl-row:last-child { border-bottom: none; }
  .tbl-row:hover { background: var(--color-background-secondary); }
  .tbl-row.active-row { background: var(--color-background-info); }
  .tbl-cell { height: 5px; border-radius: 3px; background: var(--color-border-tertiary); }
  .tbl-badge { margin-left: auto; flex-shrink: 0; width: 22px; height: 14px; border-radius: 3px; }

  .float-pane {
    position: absolute; top: 0; right: 0; bottom: 0; width: 260px;
    background: var(--color-background-primary);
    border-left: 0.5px solid var(--color-border-secondary);
    display: flex; flex-direction: column;
    transform: translateX(260px); opacity: 0;
    transition: transform 200ms ease-out, opacity 160ms ease-out;
    pointer-events: none; z-index: 20;
    box-shadow: -6px 0 20px rgba(0,0,0,0.09);
  }
  .float-pane.visible { transform: translateX(0); opacity: 1; pointer-events: all; }

  .fp-header {
    padding: 11px 14px 9px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .fp-title { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
  .fp-close {
    width: 20px; height: 20px; border-radius: 4px; border: none; background: none;
    cursor: pointer; font-size: 12px; color: var(--color-text-tertiary);
    display: flex; align-items: center; justify-content: center; font-family: var(--font-sans);
  }
  .fp-close:hover { background: var(--color-border-tertiary); color: var(--color-text-primary); }

  .fp-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .fp-section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
    color: var(--color-text-tertiary); text-transform: uppercase; margin-bottom: 8px;
  }

  .ph-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .ph-row:last-child { border-bottom: none; }
  .ph-key { height: 5px; border-radius: 3px; background: var(--color-border-tertiary); }
  .ph-val { height: 5px; border-radius: 3px; background: var(--color-border-secondary); }

  .fp-mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 44px; }
  .fp-mini-bar { flex: 1; border-radius: 2px 2px 0 0; }

  .backdrop {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.03); opacity: 0; pointer-events: none;
    transition: opacity 200ms; z-index: 15;
  }
  .backdrop.visible { opacity: 1; pointer-events: all; }

  .legend {
    padding: 12px 2px 14px; display: flex; gap: 20px;
    font-size: 11px; color: var(--color-text-tertiary); flex-wrap: wrap;
  }
</style>
</head>
<body>
<div class="demo-wrapper">
  <div class="demo-label">Pane pattern · Float pane — dashboard drilldown</div>

  <div class="shell">
    <div class="nav-pane">
      <div class="nav-icon active"><div class="icon-sq"></div></div>
      <div class="nav-icon"><div class="icon-sq" style="background:var(--color-border-tertiary)"></div></div>
      <div class="nav-divider"></div>
      <div class="nav-icon"><div class="icon-sq" style="background:var(--color-border-tertiary)"></div></div>
      <div class="nav-icon"><div class="icon-sq" style="background:var(--color-border-tertiary)"></div></div>
    </div>

    <div class="workspace">
      <div class="ws-header">
        <span class="ws-title">Dashboard</span>
        <span class="ws-hint" id="wsHint">Click any bar or table row to drilldown</span>
      </div>

      <div class="dashboard">
        <div class="card">
          <div class="card-title">Distribution</div>
          <div class="pie-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80" style="flex-shrink:0;">
              <circle cx="40" cy="40" r="30" fill="none" stroke="#B5D4F4" stroke-width="18" stroke-dasharray="94 95" stroke-dashoffset="0"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="#C0DD97" stroke-width="18" stroke-dasharray="52 95" stroke-dashoffset="-94"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="#F7C1C1" stroke-width="18" stroke-dasharray="38 95" stroke-dashoffset="-146"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="var(--color-border-tertiary)" stroke-width="18" stroke-dasharray="6 95" stroke-dashoffset="-184"/>
            </svg>
            <div class="pie-legend">
              <div class="pie-legend-row"><div class="pie-dot" style="background:#B5D4F4"></div><div class="pie-line" style="width:52px"></div></div>
              <div class="pie-legend-row"><div class="pie-dot" style="background:#C0DD97"></div><div class="pie-line" style="width:38px"></div></div>
              <div class="pie-legend-row"><div class="pie-dot" style="background:#F7C1C1"></div><div class="pie-line" style="width:44px"></div></div>
              <div class="pie-legend-row"><div class="pie-dot" style="background:var(--color-border-tertiary)"></div><div class="pie-line" style="width:30px"></div></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Trend · last 7 periods</div>
          <div class="bar-chart" id="barChart"></div>
        </div>

        <div class="card span2">
          <div class="card-title">Summary by group</div>
          <div class="tbl">
            <div class="tbl-head">
              <div class="tbl-head-cell" style="width:90px"></div>
              <div class="tbl-head-cell" style="width:55px"></div>
              <div class="tbl-head-cell" style="width:40px"></div>
              <div class="tbl-head-cell" style="width:28px; margin-left:auto"></div>
            </div>
            <div id="tblBody"></div>
          </div>
        </div>
      </div>

      <div class="backdrop" id="backdrop" onclick="closePane()"></div>

      <div class="float-pane" id="floatPane">
        <div class="fp-header">
          <span class="fp-title" id="fpTitle">Detail</span>
          <button class="fp-close" onclick="closePane()">✕</button>
        </div>
        <div class="fp-body">
          <div>
            <div class="fp-section-label">Summary</div>
            <div class="fp-mini-bars" id="fpMiniBar"></div>
          </div>
          <div>
            <div class="fp-section-label">Breakdown</div>
            <div id="fpRows"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span>→ Dashboard layout stays intact — float pane overlays without reflow</span>
    <span>→ Click backdrop or ✕ to dismiss</span>
  </div>
</div>

<script>
var barHeights = [40,55,35,70,50,80,62];
var barColors  = ['#B5D4F4','#B5D4F4','#C0DD97','#F7C1C1','#B5D4F4','#F7C1C1','#C0DD97'];
var tblRows    = [
  {w1:80,w2:50,w3:36,badge:'#C0DD97'},
  {w1:65,w2:42,w3:36,badge:'#F7C1C1'},
  {w1:72,w2:58,w3:36,badge:'#C0DD97'},
  {w1:55,w2:35,w3:36,badge:'#FAC775'},
];
var activeEl = null;

function buildBars() {
  var bc = document.getElementById('barChart');
  barHeights.forEach(function(h,i) {
    var b = document.createElement('div');
    b.className = 'bar';
    b.style.height = h + 'px';
    b.style.background = barColors[i];
    b.id = 'bar-' + i;
    b.onclick = function() { openPane('Period ' + (i+1), b); };
    bc.appendChild(b);
  });
}

function buildTable() {
  var tb = document.getElementById('tblBody');
  tblRows.forEach(function(r,i) {
    var row = document.createElement('div');
    row.className = 'tbl-row';
    row.id = 'trow-' + i;
    row.innerHTML =
      '<div class="tbl-cell" style="width:'+r.w1+'px"></div>' +
      '<div class="tbl-cell" style="width:'+r.w2+'px;opacity:0.6"></div>' +
      '<div class="tbl-cell" style="width:'+r.w3+'px;opacity:0.4"></div>' +
      '<div class="tbl-badge" style="background:'+r.badge+'"></div>';
    row.onclick = function() { openPane('Group ' + (i+1), row); };
    tb.appendChild(row);
  });
}

function openPane(label, el) {
  if (activeEl) activeEl.classList.remove('active-bar','active-row');
  activeEl = el;
  if (el.classList.contains('bar')) el.classList.add('active-bar');
  else el.classList.add('active-row');

  document.getElementById('fpTitle').textContent = label;

  var mh = [20,32,18,40,28,44,36];
  var mc = ['#B5D4F4','#B5D4F4','#C0DD97','#F7C1C1','#B5D4F4','#F7C1C1','#C0DD97'];
  document.getElementById('fpMiniBar').innerHTML = mh.map(function(h,i){
    return '<div class="fp-mini-bar" style="height:'+h+'px;background:'+mc[i]+'"></div>';
  }).join('');

  var rw = [[70,40],[55,50],[80,35],[60,45],[50,55]];
  document.getElementById('fpRows').innerHTML = rw.map(function(r){
    return '<div class="ph-row"><div class="ph-key" style="width:'+r[0]+'px"></div><div class="ph-val" style="width:'+r[1]+'px"></div></div>';
  }).join('');

  document.getElementById('floatPane').classList.add('visible');
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('wsHint').classList.add('hidden');
}

function closePane() {
  if (activeEl) { activeEl.classList.remove('active-bar','active-row'); activeEl = null; }
  document.getElementById('floatPane').classList.remove('visible');
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('wsHint').classList.remove('hidden');
}

buildBars(); buildTable();
</script>
</body>
</html>
